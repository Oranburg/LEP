title: "LEP"
subtitle: "Law and Entrepreneurship: A Working Identity"
description: "Working space for the intellectual identity of the Law and Entrepreneurship Program that Seth Oranburg will co-direct at the Catholic University of America Columbus School of Law beginning August 2026."
author:
  name: "Seth C. Oranburg"
  email: "seth.oranburg@gmail.com"
url: "https://oranburg.law"
baseurl: "/LEP"

permalink: /:title/

include:
  - _pages

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false
  parse_block_html: true

# SCSS/Sass configuration
sass:
  sass_dir: assets/scss
  style: compressed

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-tagging
  - jekyll-sass-converter

# Jekyll TOC configuration
toc:
  min_header_level: 2
  max_header_level: 3

# Tagging configuration
tag_page_layout: tag_page
tag_page_dir: tag

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - IMPROVEMENTS_SUMMARY.md
  - _proposals
  - vendor
  - node_modules
  - .github
