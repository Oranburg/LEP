title: "LEP"
subtitle: "Law and Entrepreneurship: A Working Identity"
description: "Working space for the intellectual identity of the Law and Entrepreneurship Program at the Catholic University of America Columbus School of Law, directed by Seth Oranburg (effective August 20, 2026) with founding Director Alexander Hoffarth."
author:
  name: "Seth C. Oranburg"
  email: "seth.oranburg@gmail.com"
url: "https://oranburg.law"
baseurl: "/LEP"

permalink: /:title/

# SHA-256 of the pre-release access key. Pages with `gated: true` in
# frontmatter hide their body until a visitor enters the key that hashes to
# this value. Courtesy gate, not encryption — see _includes/access-gate.html.
# Current key: lep-2026-may
gate_password_hash: "01f77d850df0564be60ae9f79698ad50acb2790e55fe887637c285a3e46eb622"

collections:
  essays:
    output: true
    permalink: /essays/:slug/

include:
  - _pages

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false
  parse_block_html: true

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-tagging

# Jekyll TOC configuration
toc:
  min_header_level: 2
  max_header_level: 3

# Tagging configuration
tag_page_layout: tag_page
tag_page_dir: tag

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "essays"
    values:
      layout: "page"

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - IMPROVEMENTS_SUMMARY.md
  - _proposals
  - vendor
  - node_modules
  - .github
