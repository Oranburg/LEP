- title: "ZOË Conference (Cluny Institute)"
  when: "July 26 to 28, 2026, Meritage Resort, Napa Valley"
  speakers: "Patrick Collison (Stripe), Bryan Johnson, Tao Lin, Fr. Harrison Ayre, Victoria Trumbull, and others"
  description: "A three-day convening of leaders from technology, religion, and culture on what a real human life looks like in the age of AI. Organized by the Cluny Institute at the Catholic University of America with support from the John Templeton Foundation. Themes include Life v. Optimization, Vitalism and Spirit, Resurrection and Revelation, and Beauty and Art as Proof of Life. The structural and substantive overlap with Magnifica Humanitas and with the LEP year-theme is direct. See https://www.cluny.org/events/zoe-conference/."

