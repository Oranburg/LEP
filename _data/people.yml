- name: "Alexander J. Hoffarth"
  role: "founding Director (incumbent)"
  bio: "Visiting Assistant Professor of Law at the Catholic University of America Columbus School of Law and the founding Director of the Law and Entrepreneurship Program. Has led the program's development at CUA Law since its institutional articulation. Email: hoffarth@cua.edu. Full bio forthcoming."

- name: "Seth C. Oranburg"
  role: "Co-Director (incoming, August 20, 2026)"
  bio: "Joins CUA Columbus School of Law on August 20, 2026 as co-director of the Law and Entrepreneurship Program. Currently Professor of Law at the University of New Hampshire Franklin Pierce School of Law. JD, University of Chicago; BA, University of Florida. Scholarship on business associations, contracts, securities regulation, trade secrets, fintech and digital assets, and Catholic social thought in commercial law. Recipient of the University Excellence in Teaching Award (2024). Author of work including the forthcoming *Architects of the Void* and *In the Shadow of the Law* listed on the Working Papers page. Full bio forthcoming."

- name: "Luke Burgis"
  role: "Institutional collaborator (Cluny Institute, CUA)"
  bio: "Associate Professor of Business at CUA and founder of the Cluny Institute. Not a teaching faculty member of LEP. Listed here as the lead of the adjacent CUA program with which LEP co-programs across the academic year. Cluny is a separate CUA program launched in December 2024 with a $2.5 million Templeton Foundation grant; its mission is dialogue across technology, religion, and culture. Burgis's work on entrepreneurship in the Catholic tradition is directly resonant with the LEP intellectual frame."
