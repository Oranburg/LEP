- name: "The Cluny Institute"
  affiliation: "Catholic University of America"
  note: "A CUA program launched in December 2024 by Luke Burgis, associate professor of business at CUA, with a $2.5 million grant from the John Templeton Foundation. Its purpose is conversation across academia, technology, and religion. Its four pillars are the Cluny Journal, education, grant-making, and the Cluny Encounters convening series. The Law and Entrepreneurship Program sits naturally adjacent: both work the same intellectual terrain (technology, work, human flourishing in the AI age), both are at CUA, and both read the question through the Catholic intellectual tradition. The flagship event is the ZOË Conference, July 26 to 28, 2026, at the Meritage Resort in Napa. See https://www.cluny.org/."
