- id: "leo-xiii-rerum-novarum"
  pope: "Leo XIII"
  encyclical: "Rerum Novarum (On Capital and Labor)"
  date: "15 May 1891"
  identity: "Leo XIII opens modern Catholic social doctrine, writing into the industrial crisis to defend workers, property, and association against both liberal capitalism and revolutionary socialism."
  move: "Rerum Novarum names the working class question and answers it by reaffirming private property (§§ 6 to 15) while binding it to a duty to the worker. Two passages carry the partnership-form spine. First, the just wage as a matter of natural justice that the labor contract alone cannot satisfy (§ 45). Second, the natural right of workingmen to form associations and the cooperative and mutual-aid societies that follow from it (§§ 48 to 51). Leo treats these private societies as part of the body politic that the state may regulate but cannot suppress. The encyclical thereby reopens, in modern conditions, the older Catholic permission of voluntary corporate life between household and state and supplies the doctrinal opening that Quadragesimo Anno and Laborem Exercens later develop into a partnership account of the firm."
  quote: "Nevertheless, there underlies a dictate of natural justice more imperious and ancient than any bargain between man and man, namely, that wages ought not to be insufficient to support a frugal and well-behaved wage-earner. (§ 45)"
  paragraph_anchors:
    - "§ 45 (just wage independent of mere contract)"
    - "§§ 48 to 51 (natural right of association, workingmen's unions, cooperatives)"
  lep_relevance: "Rerum Novarum is the doctrinal foundation for treating the firm as a moral community rather than only a contractual nexus. It supplies the LEP claim that entrepreneurship and association belong to the natural law before they belong to the market."
  vatican_url: "https://www.vatican.va/content/leo-xiii/en/encyclicals/documents/hf_l-xiii_enc_15051891_rerum-novarum.html"

- id: "pius-xi-quadragesimo-anno"
  pope: "Pius XI"
  encyclical: "Quadragesimo Anno (On the Reconstruction of the Social Order)"
  date: "15 May 1931"
  identity: "Pius XI marks the fortieth anniversary of Rerum Novarum and answers the inter-war crisis of monopoly capital and totalitarian state with a doctrine of social order built on intermediate bodies."
  move: "Quadragesimo Anno makes two contributions that the partnership tradition relies on. First, it gives the principle of subsidiarity its canonical formulation: higher associations must not absorb what lower associations can accomplish (§§ 79 to 80). Second, it advances Rerum Novarum by proposing that the pure wage contract be modified by a contract of partnership, so that workers share in ownership, management, or profits of the enterprise (§ 65). This is the encyclical that names the societas form as a development of, not a substitute for, the labor contract. Pius also restates the just wage with attention to the firm's condition (§§ 71 to 75) and condemns the concentration of economic power that hollows out the intermediate institutions subsidiarity protects."
  quote: "We consider it more advisable, however, in the present condition of human society that, so far as is possible, the work-contract be somewhat modified by a partnership-contract, as is already being done in various ways and with no small advantage to workers and owners. (§ 65)"
  paragraph_anchors:
    - "§ 65 (work-contract modified by partnership-contract)"
    - "§§ 71 to 75 (just wage with attention to the firm)"
    - "§§ 79 to 80 (subsidiarity)"
  lep_relevance: "Quadragesimo Anno gives the LEP its single most direct doctrinal warrant: the firm itself ought to evolve from pure wage contract toward partnership. Subsidiarity then frames the legal architecture in which entrepreneurial associations live."
  vatican_url: "https://www.vatican.va/content/pius-xi/en/encyclicals/documents/hf_p-xi_enc_19310515_quadragesimo-anno.html"

- id: "john-paul-ii-laborem-exercens"
  pope: "John Paul II"
  encyclical: "Laborem Exercens (On Human Work)"
  date: "14 September 1981"
  identity: "John Paul II writes on the ninetieth anniversary of Rerum Novarum and recasts the social question through a personalist philosophy of work in which the human subject, not the wage, is the measure."
  move: "Laborem Exercens establishes the priority of labor over capital (§ 12): the human worker is the efficient cause; capital is the instrument. Section 14 then translates that priority into a structural proposal. John Paul II commends joint ownership of the means of work, worker shareholding, and worker participation in management and profits as practical expressions of the principle, and argues that capital and labor cannot be opposed because all capital is itself the historical product of labor. This is the most direct twentieth-century restatement of the societas spine: the firm is not a contract between owners and hands but a community in which those who work share, by right and not by gift, in what the work produces."
  quote: "Proposals for joint ownership of the means of work, sharing by the workers in the management and/or profits of businesses, so-called shareholding by labour, etc. (§ 14)"
  paragraph_anchors:
    - "§ 12 (priority of labor over capital)"
    - "§ 14 (joint ownership, worker shareholding, profit-sharing)"
  lep_relevance: "Section 14 is the contemporary keystone for the LEP partnership-of-justice argument. It authorizes treating employee ownership and profit-sharing not as policy preference but as doctrinal entailment of the priority of the human person at work."
  vatican_url: "https://www.vatican.va/content/john-paul-ii/en/encyclicals/documents/hf_jp-ii_enc_14091981_laborem-exercens.html"

- id: "john-paul-ii-centesimus-annus"
  pope: "John Paul II"
  encyclical: "Centesimus Annus (On the Hundredth Anniversary of Rerum Novarum)"
  date: "1 May 1991"
  identity: "John Paul II writes on the centennial of Rerum Novarum in the immediate wake of 1989, offering the social doctrine's most considered account of the market, the entrepreneur, and the limits of both."
  move: "Centesimus Annus advances the tradition by recognizing the entrepreneur and disciplined human creativity as a genuine source of wealth (§ 32), naming know-how, technology, and skill as new forms of property alongside land and capital. The encyclical gives a qualified affirmation of the market and the business economy where bounded by a juridical framework and oriented to human freedom (§ 42), and insists that the market cannot reach goods that lie outside exchange. Sections 32 to 35 build a virtue account of enterprise: initiative, foresight, and acceptance of risk are moral, not merely economic, acts. The text confirms Laborem Exercens (§ 43) and refuses to let the post-1989 affirmation of markets collapse into an apology for capitalism without qualification."
  quote: "In our time, in particular, there exists another form of ownership which is becoming no less important than land: the possession of know-how, technology and skill. The wealth of the industrialized nations is based much more on this kind of ownership than on natural resources. (§ 32)"
  paragraph_anchors:
    - "§ 32 (entrepreneurship, know-how as ownership, disciplined creativity)"
    - "§§ 34 to 35 (limits of the market, human needs outside exchange)"
    - "§ 42 (qualified affirmation of business economy within juridical framework)"
  lep_relevance: "Centesimus Annus gives the LEP its doctrinal license to take entrepreneurship seriously as a virtue and human capital seriously as property, while keeping the partnership and subsidiarity claims as binding constraints on the form the enterprise takes."
  vatican_url: "https://www.vatican.va/content/john-paul-ii/en/encyclicals/documents/hf_jp-ii_enc_01051991_centesimus-annus.html"

- id: "benedict-xvi-caritas-in-veritate"
  pope: "Benedict XVI"
  encyclical: "Caritas in Veritate (On Integral Human Development in Charity and Truth)"
  date: "29 June 2009"
  identity: "Benedict XVI writes into the 2008 financial crisis and develops the social doctrine through a theology of charity, drawing on the Italian civil-economy tradition of Bruni and Zamagni."
  move: "Caritas in Veritate adds to the contract-and-justice grammar of earlier encyclicals a third principle: gratuitousness, the logic of gift, must operate inside economic life and not only beside it (§§ 34 to 39). Benedict argues that the market itself cannot function without prior bonds of solidarity and trust (§ 35), that exchange requires distributive justice and works of gift to be complete (§ 37), and that hybrid commercial forms that pursue mutuality belong inside the economy rather than at its edge (§ 38, § 46). This is the textual basis for the social-enterprise, benefit-corporation, and civil-economy programs that translate Catholic social doctrine into firm design after 2009."
  quote: "Economic life undoubtedly requires contracts, in order to regulate relations of exchange between goods of equivalent value. But it also needs just laws and forms of redistribution governed by politics, and what is more, it needs works redolent of the spirit of gift. (§ 37)"
  paragraph_anchors:
    - "§ 34 (gratuitousness in economic life)"
    - "§ 35 (market requires prior solidarity and trust)"
    - "§ 37 (contract, redistribution, and gift as three irreducible forms)"
    - "§ 38 (economy needs activities marked by gratuitousness)"
    - "§ 46 (hybrid commercial forms, civil economy)"
  lep_relevance: "Caritas in Veritate gives the LEP doctrinal cover for hybrid entity forms, benefit corporations, cooperatives, and mission-driven enterprise. The logic of gift inside the firm is the modern grammar through which the partnership tradition speaks to contemporary corporate law."
  vatican_url: "https://www.vatican.va/content/benedict-xvi/en/encyclicals/documents/hf_ben-xvi_enc_20090629_caritas-in-veritate.html"

- id: "francis-laudato-si"
  pope: "Francis"
  encyclical: "Laudato Si (On Care for Our Common Home)"
  date: "24 May 2015"
  identity: "Francis writes the first encyclical devoted to ecology and reframes the social question inside the broader bond between the human person and creation."
  move: "Laudato Si situates work and property inside an integral ecology in which human, social, and environmental relations are read together (§ 137). The encyclical reaches the partnership spine through its treatment of work as participation in creation and as the means of human dignity (§§ 124 to 129), and through its critique of the technocratic paradigm that detaches profit from place and worker from product. Francis calls for an economic ecology that refuses to treat environment, labor, and finance as separable problems (§ 141). The text is less central to the societas argument than Laborem Exercens or Caritas in Veritate, but it closes the loop by insisting that the firm answers to creation as well as to capital and labor."
  quote: "Since everything is closely interrelated, and today's problems call for a vision capable of taking into account every aspect of the global crisis, I suggest that we now consider some elements of an integral ecology, one which clearly respects its human and social dimensions. (§ 137)"
  paragraph_anchors:
    - "§§ 124 to 125 (work as participation in creation, meaning of human activity)"
    - "§ 137 (integral ecology as the frame)"
    - "§ 141 (economic ecology, work and economy not separable from environment)"
  lep_relevance: "Laudato Si requires the LEP to treat the firm's environmental and place-based duties as constitutive of its partnership character. Enterprise that ignores creation cannot satisfy the integral demands the doctrine now places on commercial form."
  vatican_url: "https://www.vatican.va/content/francesco/en/encyclicals/documents/papa-francesco_20150524_enciclica-laudato-si.html"

- id: "francis-fratelli-tutti"
  pope: "Francis"
  encyclical: "Fratelli Tutti (On Fraternity and Social Friendship)"
  date: "3 October 2020"
  identity: "Francis writes during the COVID-19 pandemic on fraternity and social friendship as the bond on which any political, economic, or associative life must rest."
  move: "Fratelli Tutti specifies the bond inside which any partnership or cooperative structure becomes intelligible. Section 162 names employment as the central social question and treats work as the path through which the person realizes initiative, talent, and dignity. Section 168 refuses the dogma that the market alone resolves social problems and calls for productive diversity and business creativity. Section 169 affirms popular movements and community production as genuine forms of economic participation, and § 120 restates the universal destination of goods as the first principle of the social order, qualifying every claim of private property. The encyclical extends Caritas in Veritate's gift logic into a fraternal political theology in which the firm is one site, not the only one, of social friendship."
  quote: "In a genuinely developed society, work is an essential dimension of social life, for it is not only a means of earning one's daily bread, but also of personal growth, the building of healthy relationships, self-expression and the exchange of gifts. (§ 162)"
  paragraph_anchors:
    - "§ 120 (universal destination of goods as first principle)"
    - "§ 162 (employment as the central social question, work as path to dignity)"
    - "§ 168 (the market alone cannot resolve social problems)"
    - "§ 169 (popular movements, community production, participation)"
  lep_relevance: "Fratelli Tutti supplies the LEP with the relational ground on which partnership forms rest. Social friendship is the bond that distinguishes a true societas from a mere contract, and § 162 makes the dignity of work the test of any enterprise design."
  vatican_url: "https://www.vatican.va/content/francesco/en/encyclicals/documents/papa-francesco_20201003_enciclica-fratelli-tutti.html"

- id: "leo-xiv-magnifica-humanitas"
  pope: "Leo XIV"
  encyclical: "Magnifica Humanitas (On Safeguarding the Human Person in the Time of Artificial Intelligence)"
  date: "15 May 2026"
  identity: "Leo XIV issues his first social encyclical on the 135th anniversary of Rerum Novarum, restating the social doctrine for the AI age and signaling continuity with Leo XIII by choice of regnal name and promulgation date."
  move: "Magnifica Humanitas frames the AI age through two biblical scenes: the Tower of Babel as the project of uniform technological self-sufficiency without reference to God, and Nehemiah rebuilding the walls of Jerusalem as the contrasting work of human-scaled, covenantal reconstruction (§ 7). It then advances the doctrine on three fronts that touch the partnership spine. First, it names new forms of property, patents, algorithms, digital platforms, infrastructure, and data, and brings them under the universal destination of goods (§ 67). Second, it describes the hidden labor chain behind AI systems, data labelers, content moderators, and mineral extractors, as a contemporary failure of the dignity of work (§ 173). Third, it names data colonialism as a new form of dependence in which control of health, genetic, and demographic data becomes structural power over peoples (§ 178). The encyclical insists that the invisible hand cannot govern AI economies (§ 163) and calls politics and law to orient technology to the common good."
  quote: "Even today, colonialism assumes new forms. It no longer dominates only bodies, but appropriates data, transforming personal lives into exploitable information. (§ 178)"
  paragraph_anchors:
    - "§ 7 (Babel and Nehemiah as the governing biblical figures)"
    - "§ 67 (algorithms, platforms, infrastructure, and data as new forms of property under the universal destination of goods)"
    - "§ 163 (politics must orient AI economies; the invisible hand is insufficient)"
    - "§ 173 (hidden labor chain of AI: data labelers, moderators, miners)"
    - "§ 178 (data colonialism as a new form of dependence)"
  lep_relevance: "Magnifica Humanitas is the doctrinal charter for the LEP's AI-age agenda: it brings algorithms and data inside the universal destination of goods, restates worker dignity in the supply chain of compute, and identifies data colonialism as the new form the partnership tradition must answer."
  vatican_url: "https://www.vatican.va/content/leo-xiv/en/encyclicals/documents/20260515-magnifica-humanitas.html"
