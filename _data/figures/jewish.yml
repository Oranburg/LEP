    hebrew: "[No single primary-text excerpt selected; the relevant Shulchan Arukh text is SA YD 247-259 (unpointed). Insert specific halakha from SA YD 247 if a breakout-box pullquote is needed.]"
    transliteration: "[verify: pending selection of SA YD pullquote]"
    translation: "[verify: pending selection]"
