# Catholic and ancient lineage: figures in the partnership-form-of-justice tradition
# Source data for click-to-expand breakout boxes on /LEP/lineage/ diagram.

- id: "ulpian"
  name: "Domitius Ulpianus (Ulpian)"
  dates: "c. 170 to 228 CE"
  identity: "Severan-era Roman jurist whose excerpts make up roughly a third of Justinian's Digest, including the classical edictal commentary on commercial agency."
  work: "Digest 14.1, De exercitoria actione (Ulpian, ad edictum 28), preserving the praetorian actio exercitoria against the exercitor navis for contracts struck by the magister navis."
  move: "Ulpian fixed the doctrine that the exercitor, the principal who set the ship in commerce, answered in solidum on the contracts of the magister he appointed, even though the magister contracted in his own name. He treated the appointment itself as the ground of liability: a third party who dealt with a ship's master in the necessity of navigation could reach the venture's principal. This structural pairing of operator and capital provider, each exposed through the shared maritime enterprise, supplied the Roman template for societas reasoning. Aquinas and the Salamancans later read it as proof that capital placed at genuine risk in a productive venture carries a different juridical character from a mutuum."
  quote: "Utilitas huius edicti patet: nam cum interdum ignari, cuius sint condicionis vel quales, cum magistris propter navigandi necessitatem contrahamus, aequum fuit eum qui magistrum navi imposuit teneri."
  further_reading:
    - "Reinhard Zimmermann, The Law of Obligations: Roman Foundations of the Civilian Tradition 50 to 58, 455 to 463 (Oxford Univ. Press 1996)."
    - "Adolf Berger, Encyclopedic Dictionary of Roman Law s.v. actio exercitoria, exercitor (Am. Phil. Soc'y 1953)."
    - "The Digest of Justinian (Alan Watson ed. and trans., Univ. of Pa. Press 1985), bk. 14, tit. 1."
    - "Andreas M. Fleckner, Roman Business Associations, in Roman Law and Economics (Giuseppe Dari-Mattiacci and Dennis P. Kehoe eds., Oxford Univ. Press 2020)."
  lep_relevance: "The exercitoria action is the earliest doctrinal architecture in which capital and operatorship are bound into one venture with shared exposure, the structural premise the LEP curriculum treats as the juridical genome of partnership and, later, of the firm. Reading Ulpian first lets students see that limited liability and entity theory are downstream variations on a Roman commercial-agency move, not modern inventions."

- id: "aquinas"
  name: "Thomas Aquinas"
  dates: "1225 to 1274"
  identity: "Dominican theologian at Paris and Naples whose Summa Theologiae synthesized Aristotelian philosophy, Roman law, and patristic moral theology into the framework Catholic jurists used for the next four centuries."
  work: "Summa Theologiae II-II q. 78 (De peccato usurae), art. 1 (whether taking usury for a money loan is sinful) and art. 2 ad 5 (the societas distinction)."
  move: "Aquinas held in article 1 that charging for the use of a fungible consumed in use, the classical mutuum, is unjust because use and ownership cannot be separated in such a thing; the lender thus sells what does not exist or sells the same thing twice. In article 2 ad 5 he carved the decisive exception. When an investor entrusts money to a merchant or craftsman in the form of a societas, ownership of the money does not pass; the investor retains dominium, bears the risk of loss, and may justly claim a share of the profit the venture earns. This single reply established the canonical distinction between mutuum and societas, made equity finance morally licit in the scholastic tradition, and supplied the doctrinal seed the Salamanca School would cultivate."
  quote: "Ille qui mutuat pecuniam, transfert dominium pecuniae in eum cui mutuat... Ille vero qui committit pecuniam suam vel mercatori vel artifici per modum societatis cuiusdam, non transfert dominium pecuniae suae in illum, sed remanet eius, ita quod cum periculo ipsius mercator de ea negotiatur, vel artifex operatur; et ideo licite potest partem lucri inde provenientis tamquam de re sua expetere."
  further_reading:
    - "Thomas Aquinas, Summa Theologiae II-II, q. 78, in S. Thomae Aquinatis Opera Omnia (Leonine ed., Rome 1882 to present)."
    - "John T. Noonan, Jr., The Scholastic Analysis of Usury 133 to 153 (Harvard Univ. Press 1957)."
    - "Diana Wood, Medieval Economic Thought 159 to 205 (Cambridge Univ. Press 2002)."
    - "Odd Langholm, Economics in the Medieval Schools: Wealth, Exchange, Value, Money and Usury According to the Paris Theological Tradition 1200 to 1350, at 229 to 244 (Brill 1992)."
  lep_relevance: "Article 2 ad 5 is the textual hinge for the LEP claim that equity finance has a moral structure distinct from debt and that the partnership form, not the loan, is the native vehicle of entrepreneurial justice. Every later figure on the lineage is doing exegesis on this paragraph."

- id: "vitoria"
  name: "Francisco de Vitoria"
  dates: "c. 1483 to 1546"
  identity: "Dominican prima professor at Salamanca whose relectiones founded the School of Salamanca and refitted Thomist moral theology for the commercial and colonial conditions of sixteenth-century Castile."
  work: "Commentary on Summa Theologiae II-II q. 77 (on cheating in buying and selling) and q. 78, delivered in his Salamanca lectures and circulated in his Relectiones Theologicae (posthumous, Lyon 1557)."
  move: "Vitoria refigured the just price (pretium iustum) as communis aestimatio, the common estimation of buyers and sellers in an actual market with sufficient participants, rather than a cost-of-production figure or a price set by a theologian. He held that the mathematical just price is known to God alone (pretium iustum mathematicum soli Deo notum); human justice operates within a latitude between a pretium pium and a pretium rigidum, with a moderate price in between. By relocating moral judgment from a single point to a range generated by merchant practice, Vitoria let the market itself supply the moral baseline against which partnership returns, exchange transactions, and the profits of a societas could be measured. This is the analytic move that made the rest of Salamancan economics possible."
  quote: "Pretium iustum mathematicum, licet soli Deo notum sit, tamen ex communi aestimatione hominum colligi potest."
  further_reading:
    - "Francisco de Vitoria, Comentarios a la Secunda Secundae de Santo Tomás (Vicente Beltrán de Heredia ed., 6 vols., Salamanca 1932 to 1952)."
    - "Marjorie Grice-Hutchinson, The School of Salamanca: Readings in Spanish Monetary Theory 1544 to 1605 (Clarendon Press 1952)."
    - "School of Salamanca, Stanford Encyclopedia of Philosophy (rev. ed. 2021)."
    - "Wim Decock, Theologians and Contract Law: The Moral Transformation of the Ius Commune (ca. 1500 to 1650) (Martinus Nijhoff 2013)."
  lep_relevance: "Vitoria gives LEP students the conceptual permission to treat markets as moral instruments, not moral hazards. His communis aestimatio is the reason a partnership's distribution can be measured against a real price rather than a theorist's price, and the reason entrepreneurial valuation is not, in itself, a vice."

- id: "soto"
  name: "Domingo de Soto"
  dates: "1494 to 1560"
  identity: "Dominican theologian, Vitoria's successor in the prima chair at Salamanca, imperial confessor to Charles V, and the systematizer who turned Vitoria's lectures into a comprehensive treatise on justice and right."
  work: "De Iustitia et Iure Libri Decem (Salamanca: Andrés de Portonariis, first edition 1553 to 1554; expanded editions 1556 and later)."
  move: "Soto built the first full Salamancan system of contract and restitution out of Aquinas's framework. Book IV treats commutative justice and the contract types: emptio venditio, locatio conductio, mutuum, depositum, and societas. He worked through the conditions under which a partner's claim on profit is just, when capital must share in loss, and when an arrangement collapses into a disguised usurious loan. His restitution doctrine, the duty to return what one wrongly holds together with the fruits, became the standard moral grammar through which the rest of the School analyzed exchanges, foreign currency dealings, and partnership distributions. Soto fixed the categories Mercado, Molina, and Azpilcueta would refine."
  quote: ""
  further_reading:
    - "Domingo de Soto, De Iustitia et Iure Libri Decem (Salamanca: Andrés de Portonariis 1553 to 1554; facsimile and Spanish trans., Instituto de Estudios Políticos, Madrid 1967 to 1968)."
    - "Wim Decock, Theologians and Contract Law: The Moral Transformation of the Ius Commune (ca. 1500 to 1650), at 70 to 102 (Martinus Nijhoff 2013)."
    - "Juan Belda Plans, La Escuela de Salamanca y la renovación de la teología en el siglo XVI (BAC 2000)."
    - "Jesús Huerta de Soto, New Light on the Prehistory of the Theory of Banking and the School of Salamanca, 9 Rev. Austrian Econ. 59 (1996)."
  lep_relevance: "Soto turned partnership-form justice into a treatise discipline. For LEP, he is the figure who shows that the moral analysis of contracts is a system, not an aphorism, and that restitution doctrine supplies the structural test for whether any entrepreneurial arrangement is, in fact, just."

- id: "mercado"
  name: "Tomás de Mercado"
  dates: "c. 1525 to 1575"
  identity: "Dominican friar trained in Mexico and Seville, moral adviser to the Consulado de Mercaderes in Seville, the merchant guild that organized the Indies trade."
  work: "Suma de Tratos y Contratos (Seville: Hernando Díaz, 1571), an expanded vernacular edition of his 1569 Tratos de Indias y tratantes en ellas."
  move: "Commissioned by the Seville merchant consulate, Mercado wrote in Castilian rather than Latin so that the merchants who actually moved silver, bills of exchange, and Indies cargoes could read the moral analysis themselves. In six books he treated monetary theory, monopoly, the Carrera de Indias, usury, just price, and partnership. He examined the cambio (bill-of-exchange contract), the compañía structures used in transatlantic ventures, the sea-loan, and the practices of the Genoese banking nation at Seville. Mercado's contribution to the partnership tradition is concrete: he tested Aquinas's societas distinction against the actual instruments merchants used, identified where a nominal company concealed a usurious loan, and authorized the genuine forms in which capital, operator, and risk were jointly placed."
  quote: ""
  further_reading:
    - "Tomás de Mercado, Suma de Tratos y Contratos (Nicolás Sánchez-Albornoz ed., Instituto de Estudios Fiscales, Madrid 1977) (reprinting the 1571 Seville edition)."
    - "Restituto Sierra Bravo, El pensamiento social y económico de la Escolástica, desde sus orígenes al comienzo del catolicismo social, vol. 1 (CSIC 1975)."
    - "Marjorie Grice-Hutchinson, Early Economic Thought in Spain 1177 to 1740, at 96 to 110 (Allen and Unwin 1978)."
    - "Wim Decock, Tomás de Mercado's Summa de tratos y contratos, 1569, Salamanca Working Papers Series 2021-01."
  lep_relevance: "Mercado is the lineage's bridge from theology to practice. For LEP he models the role of the lawyer-moralist embedded in a commercial community: writing for the operator in the operator's own language, distinguishing legitimate venture finance from disguised usury at the level of the deal."

- id: "molina"
  name: "Luis de Molina"
  dates: "1535 to 1600"
  identity: "Jesuit theologian who taught at Coimbra and Évora, best known philosophically for the doctrine of middle knowledge but equally central to the Salamancan tradition of contract and economic analysis."
  work: "De Iustitia et Iure, in five tractates published as six volumes (Cuenca and Antwerp 1593 to 1609; first volume on justice in general, Cuenca 1593; tractate on contracts, Cuenca 1597; later tractates published partly posthumously at Antwerp through 1609)."
  move: "Molina pushed the scholastic analysis of partnership to its most exact form. His tractate on contracts dissected the societas into its species, allocated risk between capital partner and industrial partner, and worked out the conditions under which a guaranteed return inside a partnership remained licit (the triple contract, contractus trinus) and when it collapsed into usury. He extended communis aestimatio to monopoly pricing, wage setting, and the cambio. He treated freedom of contract as a presumption that parties may shape their own arrangements within the bounds of commutative justice. His monetary analysis recognized that the value of money varies by place and time, which let him analyze foreign-exchange profit as compensation for genuine differences rather than disguised interest."
  quote: ""
  further_reading:
    - "Luis de Molina, De Iustitia et Iure Tractatus (Cuenca and Antwerp 1593 to 1609), reprinted in De Iustitia et Iure: Tractatus (Wim Decock and Manuela Bragagnolo eds., frommann-holzboog, ongoing critical edition)."
    - "Diego Alonso-Lasheras, Luis de Molina's De iustitia et iure: Justice as Virtue in an Economic Context (Brill 2011)."
    - "Wim Decock, Theologians and Contract Law: The Moral Transformation of the Ius Commune (ca. 1500 to 1650) (Martinus Nijhoff 2013)."
    - "Conimbricenses.org Encyclopedia, Luís de Molina, De Iustitia et Iure (1593 to 1609)."
  lep_relevance: "Molina is the lineage's most precise contract theorist. For LEP he models the rigorous casuistry by which a juridical tradition keeps faith with its first principles while authorizing increasingly sophisticated entrepreneurial instruments. The triple contract is the direct ancestor of preferred equity and structured venture finance."

- id: "azpilcueta"
  name: "Martín de Azpilcueta (Doctor Navarrus)"
  dates: "1491 to 1586"
  identity: "Navarrese canonist and moral theologian, professor at Toulouse, Cahors, Salamanca, and Coimbra, and consultor to the Roman Curia under three popes; the most influential confessor's manualist of the sixteenth century."
  work: "Manual de Confesores y Penitentes (Coimbra 1553; expanded Latin and Castilian editions through 1556 and after) and the Comentario Resolutorio de Cambios, appended to his Comentario Resolutorio de Usuras (Salamanca and Coimbra 1556)."
  move: "In the Comentario Resolutorio de Cambios, Azpilcueta gave the first explicit statement that money loses purchasing power as its quantity in a place rises, the formulation now credited as the earliest version of the quantity theory of money. He used this insight to analyze the cambio: a bill of exchange that moved money across places of different monetary abundance generated a licit gain because it transferred value across genuinely different price levels, not because it charged for time. Whether Azpilcueta articulated time value of money in the modern sense is contested; his analysis is fundamentally about value across space and across currencies, with the time element entering as the duration of the exchange. [verify: modern attributions of a full time-value-of-money theory to Azpilcueta often gloss what is in the text a spatial and monetary, rather than temporal, argument.]"
  quote: "Caeteris paribus, en las tierras do hay gran falta de dinero, valen menos las cosas vendibles, y aun las manos y trabajo de los hombres, que do hay abundancia dél."
  further_reading:
    - "Martín de Azpilcueta, Comentario Resolutorio de Cambios (Alberto Ullastres, Luciano Pereña, and José M. Pérez Prendes eds., CSIC, Madrid 1965) (reprinting the 1556 Salamanca edition)."
    - "Marjorie Grice-Hutchinson, The School of Salamanca: Readings in Spanish Monetary Theory 1544 to 1605, at 91 to 103 (Clarendon Press 1952)."
    - "Alejandro A. Chafuen, Faith and Liberty: The Economic Thought of the Late Scholastics 51 to 76 (Lexington Books 2003)."
    - "Raymond de Roover, The Concept of the Just Price: Theory and Economic Policy, 18 J. Econ. Hist. 418 (1958)."
  lep_relevance: "Azpilcueta lets the LEP tradition handle money itself as an object of justice. Once money's value is recognized as variable by place and quantity, the moral analysis of partnership returns, foreign-exchange profit, and venture finance can proceed without collapsing every gain into interest. His move is the monetary precondition for treating entrepreneurial return as something other than disguised usury."
