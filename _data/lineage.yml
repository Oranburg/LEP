catholic:
  - figure: "Saint Benedict"
    work: "Rule of Saint Benedict"
    contribution: "Ora et labora. Work and prayer united as the human response to God."
  - figure: "Thomas Aquinas"
    work: "Summa Theologiae II-II q. 78"
    contribution: "The *societas* doctrine. Partnership at risk is the just form of capital."
  - figure: "Salamanca School"
    work: "Sixteenth-century commercial moral theology"
    contribution: "Developed Aquinas's *societas* into a full theology of commercial partnership."
  - figure: "Leo XIII"
    work: "Rerum Novarum (1891)"
    contribution: "Modern social doctrine begins. Between unbridled capitalism and socialism."
  - figure: "John Paul II"
    work: "Laborem Exercens (1981)"
    contribution: "Personalist anthropology of work. Employee shareholding endorsed in section 14."
  - figure: "Leo XIV"
    work: "Magnifica Humanitas (2026)"
    contribution: "The AI-age restatement. Babel and Nehemiah as the governing images."

jewish:
  - source: "Leviticus 25:35 to 36"
    contribution: "So that he may live with you. The verse-source of the partnership obligation."
  - source: "Deuteronomy 16:20"
    contribution: "Justice, justice shall you pursue. The doubled pursuit of justice through just means."
  - source: "Maimonides, Mishneh Torah, Hilkhot Mattenot Aniyim 10:7 to 14"
    contribution: "Eight rungs of *tzedakah*. The highest is partnership (*shutafut*) with the poor."
