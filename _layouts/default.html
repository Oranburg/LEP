<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% elsif page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <meta name="theme-color" content="#f5f3ee" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0A3255" media="(prefers-color-scheme: dark)">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Oswald:wght@500..700&family=Roboto:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript><link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Oswald:wght@500..700&family=Roboto:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"></noscript>
  
  <!-- Main compiled CSS from SCSS -->
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  <!-- Enhancement styles -->
  <link rel="stylesheet" href="{{ '/assets/css/enhancements.css' | relative_url }}?v={{ site.time | date: '%s' }}">
  
  <!-- Theme persistence script -->
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('theme');
        if (theme === 'light' || theme === 'dark') {
          document.documentElement.setAttribute('data-theme', theme);
        } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
          document.documentElement.setAttribute('data-theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      } catch(e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  
  {% seo %}
  {% feed_meta %}
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>

  {% include header-updated.html %}

  <main class="site-content" id="main-content">
    {{ content }}
  </main>

  {% include footer-updated.html %}

  {% include access-gate.html %}

  <!-- Enhanced JavaScript with accessibility improvements -->
  <script src="{{ '/assets/js/site-enhanced.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
  
  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('{{ "/assets/js/service-worker.js" | relative_url }}').then(
          function(registration) {
            console.log('Service Worker registered:', registration);
          },
          function(error) {
            console.log('Service Worker registration failed:', error);
          }
        );
      });
    }
  </script>
  
  <!-- Mermaid diagrams support for timeline pages -->
  {% if page.mermaid %}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ 
      startOnLoad: true, 
      theme: document.documentElement.getAttribute('data-theme') === 'light' ? 'default' : 'dark',
      securityLevel: 'loose',
      logLevel: 'info'
    });
    mermaid.contentLoaded();
  </script>
  {% endif %}
</body>
</html>
