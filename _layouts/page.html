---
layout: default
---
{%- if page.gated -%}
<article class="page page-gated" data-gated-locked>
  <div class="gate-placeholder">
    <p>&#128274; This essay is in pre-release. Click the lock in the menu bar to enter the access key.</p>
  </div>
  <div class="gate-content">
    {% include table-of-contents.html %}
    {{ content }}
  </div>
</article>
{%- else -%}
<article class="page">
  {% include table-of-contents.html %}
  {{ content }}
</article>
{%- endif -%}
