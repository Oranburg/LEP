<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 200" width="560" height="200"
     role="img" aria-label="The single-letter substitution that turns Hevel into Bavel: the open hey at the front of Hevel is replaced by the closed bet of Bavel, sealing the word.">
  <title>Hevel / Bavel: the front-letter swap</title>
  <defs>
    <style>
      text { font-family: "Times New Roman", Georgia, serif; }
    </style>
  </defs>

  <!-- Background panels -->
  <rect x="10" y="10" width="230" height="180" rx="4" fill="#f5f2ec" stroke="#a89b7d" stroke-width="1"/>
  <rect x="320" y="10" width="230" height="180" rx="4" fill="#1e3a5f" stroke="#0f2235" stroke-width="1"/>

  <!-- HEVEL panel -->
  <!-- Distinguishing letter: hey — open, breath-colored -->
  <text x="60" y="115" font-size="80" fill="#b5863a" text-anchor="middle" direction="rtl">ה</text>
  <!-- Shared letters: bet + lamed -->
  <text x="160" y="115" font-size="80" fill="#1a1a1a" text-anchor="middle" direction="rtl">בל</text>
  <!-- Label row -->
  <text x="125" y="160" font-size="13" fill="#555" text-anchor="middle">הֶבֶל</text>
  <text x="125" y="176" font-size="11" fill="#888" text-anchor="middle" font-style="italic">Hevel — breath, vapor</text>

  <!-- Arrow -->
  <line x1="248" y1="100" x2="312" y2="100" stroke="#888" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#888"/>
    </marker>
  </defs>
  <!-- Swap annotation -->
  <text x="280" y="92" font-size="10" fill="#888" text-anchor="middle">ה → ב</text>
  <text x="280" y="124" font-size="9" fill="#aaa" text-anchor="middle">one letter</text>

  <!-- BAVEL panel -->
  <!-- Both bets: closed wall, dark -->
  <text x="370" y="115" font-size="80" fill="#f5f0e8" text-anchor="middle" direction="rtl">ב</text>
  <!-- Shared: bet + lamed — second bet highlighted same as first -->
  <text x="470" y="115" font-size="80" fill="#f5f0e8" text-anchor="middle" direction="rtl">בל</text>
  <!-- Label row -->
  <text x="435" y="160" font-size="13" fill="#c0bbb0" text-anchor="middle">בָּבֶל</text>
  <text x="435" y="176" font-size="11" fill="#8a9db5" text-anchor="middle" font-style="italic">Bavel — confusion, Babel</text>

  <!-- Open-side indicator on hey -->
  <text x="60" y="140" font-size="9" fill="#b5863a" text-anchor="middle">open</text>
  <!-- Sealed indicator on first bet -->
  <text x="370" y="140" font-size="9" fill="#8a9db5" text-anchor="middle">sealed</text>
</svg>
