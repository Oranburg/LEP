<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" width="520" height="300"
     role="img" aria-label="The four letters of hefker — hey, peh, kuf, resh — each examined for what it contributes to the property category of the constitutively ownerless.">
  <title>הפקר — the anatomy of ownerlessness</title>
  <defs>
    <style>
      text { font-family: "Times New Roman", Georgia, serif; }
    </style>
  </defs>

  <!-- heading -->
  <text x="260" y="30" font-size="16" fill="#1a1a1a" text-anchor="middle" letter-spacing="2">הָפְקֵר</text>
  <text x="260" y="48" font-size="11" fill="#888" text-anchor="middle" font-style="italic">hefker — ownerless; the constitutive wilderness category</text>

  <!-- Four letter tiles, right to left in reading order: he, peh, kuf, resh -->
  <!-- tile dimensions -->

  <!-- HEY tile -->
  <rect x="20" y="65" width="105" height="160" rx="4" fill="#f5f2ec" stroke="#a89b7d" stroke-width="1"/>
  <text x="72" y="158" font-size="90" fill="#b5863a" text-anchor="middle">ה</text>
  <text x="72" y="188" font-size="12" fill="#555" text-anchor="middle" font-style="italic">hey</text>
  <text x="72" y="204" font-size="9" fill="#888" text-anchor="middle">breath, opening</text>
  <text x="72" y="217" font-size="8" fill="#aaa" text-anchor="middle">what enters from outside</text>

  <!-- PEH tile -->
  <rect x="138" y="65" width="105" height="160" rx="4" fill="#f5f2ec" stroke="#a89b7d" stroke-width="1"/>
  <text x="190" y="158" font-size="90" fill="#1a1a1a" text-anchor="middle">פ</text>
  <text x="190" y="188" font-size="12" fill="#555" text-anchor="middle" font-style="italic">peh</text>
  <text x="190" y="204" font-size="9" fill="#888" text-anchor="middle">mouth, speech</text>
  <text x="190" y="217" font-size="8" fill="#aaa" text-anchor="middle">the word that releases</text>

  <!-- KUF tile -->
  <rect x="256" y="65" width="105" height="160" rx="4" fill="#1e3a5f" stroke="#0f2235" stroke-width="1"/>
  <text x="308" y="158" font-size="90" fill="#e0f0ff" text-anchor="middle">ק</text>
  <text x="308" y="188" font-size="12" fill="#8aabcc" text-anchor="middle" font-style="italic">kuf</text>
  <text x="308" y="204" font-size="9" fill="#607590" text-anchor="middle">what descends below the line</text>
  <text x="308" y="217" font-size="8" fill="#4a5f75" text-anchor="middle">the part no one owns</text>

  <!-- RESH tile -->
  <rect x="374" y="65" width="105" height="160" rx="4" fill="#f5f2ec" stroke="#a89b7d" stroke-width="1"/>
  <text x="426" y="158" font-size="90" fill="#1a1a1a" text-anchor="middle">ר</text>
  <text x="426" y="188" font-size="12" fill="#555" text-anchor="middle" font-style="italic">resh</text>
  <text x="426" y="204" font-size="9" fill="#888" text-anchor="middle">head, beginning</text>
  <text x="426" y="217" font-size="8" fill="#aaa" text-anchor="middle">each head lifted, not owned</text>

  <!-- contrast row below: property captures vs hefker releases -->
  <rect x="20" y="240" width="230" height="48" rx="3" fill="#3d1a0f" stroke="#6b2e1a" stroke-width="1"/>
  <text x="135" y="260" font-size="10" fill="#c8a07a" text-anchor="middle">res nullius — capture invited</text>
  <text x="135" y="277" font-size="9" fill="#9a7055" text-anchor="middle">the first taker takes</text>

  <rect x="270" y="240" width="230" height="48" rx="3" fill="#1e3a5f" stroke="#0f2235" stroke-width="1"/>
  <text x="385" y="260" font-size="10" fill="#b8d0f0" text-anchor="middle">hefker — receiving invited</text>
  <text x="385" y="277" font-size="9" fill="#7899bb" text-anchor="middle">the willing may receive</text>
</svg>
