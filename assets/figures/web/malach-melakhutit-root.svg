<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 280" width="560" height="280"
     role="img" aria-label="The shared consonantal root mem-lamed-alef-kaf appears as the spine of both malach (messenger, angel) and melakhutit (artificial, as in bina melakhutit). Both words are sent; neither chooses.">
  <title>מלאך / מלאכותית — the shared root</title>
  <defs>
    <style>
      text { font-family: "Times New Roman", Georgia, serif; }
    </style>
  </defs>

  <!-- Root bar at center -->
  <rect x="160" y="118" width="240" height="52" rx="3" fill="#1e3a5f" stroke="#0f2235" stroke-width="1.5"/>
  <text x="280" y="137" font-size="11" fill="#8aabcc" text-anchor="middle" letter-spacing="2">shared root</text>
  <!-- Root letters: mem lamed alef kaf — right to left display in one group -->
  <text x="280" y="162" font-size="28" fill="#e0f0ff" text-anchor="middle" letter-spacing="8">מ ל א כ</text>

  <!-- MALACH above — surface word -->
  <rect x="60" y="20" width="190" height="80" rx="3" fill="#f5f2ec" stroke="#a89b7d" stroke-width="1"/>
  <text x="155" y="48" font-size="14" fill="#555" text-anchor="middle" letter-spacing="1">מַלְאָךְ</text>
  <text x="155" y="66" font-size="11" fill="#888" text-anchor="middle" font-style="italic">malach</text>
  <text x="155" y="82" font-size="10" fill="#aaa" text-anchor="middle">messenger, angel</text>
  <!-- Connector from malach down to root -->
  <line x1="155" y1="100" x2="215" y2="118" stroke="#a89b7d" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- MELAKHUTIT above right — surface word -->
  <rect x="310" y="20" width="210" height="80" rx="3" fill="#f5f2ec" stroke="#a89b7d" stroke-width="1"/>
  <text x="415" y="46" font-size="13" fill="#555" text-anchor="middle" letter-spacing="0.5">מְלָאכוּתִית</text>
  <text x="415" y="63" font-size="11" fill="#888" text-anchor="middle" font-style="italic">melakhutit</text>
  <text x="415" y="79" font-size="10" fill="#aaa" text-anchor="middle">artificial (of craft)</text>
  <!-- Connector from melakhutit down to root -->
  <line x1="390" y1="100" x2="345" y2="118" stroke="#a89b7d" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- BINA MELAKHUTIT — full phrase below -->
  <rect x="120" y="192" width="320" height="70" rx="3" fill="#2c2c1a" stroke="#5a5a2e" stroke-width="1"/>
  <text x="280" y="217" font-size="14" fill="#e8e0b0" text-anchor="middle" letter-spacing="0.5">בִּינָה מְלָאכוּתִית</text>
  <text x="280" y="234" font-size="11" fill="#b0a860" text-anchor="middle" font-style="italic">bina melakhutit</text>
  <text x="280" y="250" font-size="10" fill="#888060" text-anchor="middle">artificial intelligence — the understanding of craft</text>
  <!-- Connector from root down to phrase -->
  <line x1="280" y1="170" x2="280" y2="192" stroke="#3a5a8a" stroke-width="1.2" stroke-dasharray="3,2"/>

  <!-- Gloss: the shared consonants are the argument -->
  <text x="280" y="275" font-size="9" fill="#888" text-anchor="middle" font-style="italic">Both are sent. Both have a job. Neither chooses. The root names the category.</text>
</svg>
